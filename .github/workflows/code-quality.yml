name: 🔎 Code Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linter:
    name: 🧹 Linter
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Run linter
        run: bun run lint:oxlint

  typescriptChecker:
    name: 🟦 TypeScript Checker
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Run TypeScript checker
        run: bun run lint:ts

  tests:
    name: 🔬 Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Run tests
        run: SKIP_ENV_VALIDATION=true bun run test:ci

  bundleStats:
    name: 📦 Bundle Stats
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SKIP_ENV_VALIDATION: "true"
      DATABASE_URL: postgresql://portfolio:portfolio@localhost:5432/portfolio
      VITE_BASE_URL: http://localhost:3000
      VITE_IS_DEMO: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Build
        run: bun run build

      - name: Measure bundle size
        run: bun run measure:bundle-size

      - name: Report bundle size
        run: |
          SIZE=$(node -e "const j=require('./src/features/code-quality/code-quality.gen.json'); process.stdout.write(String(j.bundleKb))")
          echo "### 📦 Bundle size: ${SIZE} kB gz" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-stats
          path: src/features/code-quality/code-quality.gen.json
          retention-days: 30

      - name: Commit updated stats
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/code-quality.json src/features/code-quality/code-quality.gen.json
          git diff --staged --quiet || git commit -m "chore: update code quality stats [skip ci]"
          git push
